<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChanStock - 缠论智能分析</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app"></div>
    <!-- 防止主题闪烁（FOUC）：在 Vue 加载前应用保存的主题 -->
    <script>
      (function() {
        var saved = localStorage.getItem('theme');
        if (saved === 'dark') {
          document.documentElement.setAttribute('data-theme', 'dark');
        } else {
          // 默认亮色主题（saved 为 null 或 'light'）
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
